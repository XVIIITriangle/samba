[global]
	workgroup = WORKGROUP
	server string = "Sambochka"
	netbios name = ""
	security = "user"
	map to guest = "Bad User"
	server role = "standalone server"

	log file = /var/log/samba/log.%m
	max log size = 1000
	syslog = 0

	passdb backend = "tdbsam"
	obey pam restrictions = yes

	smb ports = "445"
	client max protocol = "SMB3"
	server min protocol = "SMB2"

	restrict anonymous = "2"
	hosts allow = "127. 192.168."

[public]
	path = /srv/samba/public
	browseable = "yes"
	read only = "yes"
	guest ok = "yes"
	create mask = "0664"
	directory mask = "2775"
	valid users = ""
	force user = ""
	force group = smbshare

[private]
	path = /srv/samba/private
	browseable = "yes"
	writeable = "yes"
	guest ok = "no"
	create mask = "0660"
	directory mask = "2770"
	valid users = samba-user
	force user = samba-user
	force group = smbshare


