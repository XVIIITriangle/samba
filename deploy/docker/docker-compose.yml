version: "3.8"

services:
  samba:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: samba-alpine
    ports:
      - "445:445"
    environment:
      - SAMBA_USER=username
      - SAMBA_PASSWORD=YourPassw0rd
      - SAMBA_GROUP=groupname
      - SAMBA_UID=1000
      - SAMBA_GID=1000
    volumes:
      - ./data:/srv/samba
      - ./config:/etc/samba:ro
    restart: unless-stopped

